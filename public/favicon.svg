<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="#0f1117"/>

  <!-- Subtle teal accent border -->
  <rect width="32" height="32" rx="7" fill="none" stroke="#01696f" stroke-width="1.5"/>

  <!-- Letter S -->
  <text
    x="5"
    y="22"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="14"
    font-weight="700"
    fill="#4f98a3"
    letter-spacing="-0.5"
  >SN</text>

  <!-- Teal underline accent -->
  <line x1="5" y1="25.5" x2="27" y2="25.5" stroke="#01696f" stroke-width="1.5" stroke-linecap="round"/>
</svg>
